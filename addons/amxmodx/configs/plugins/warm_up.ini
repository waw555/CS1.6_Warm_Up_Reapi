;
; Конфигурационный файл WARM UP v. 1.0.0 by Emma Jule
;
;
; Некоторые настройки самой системы
; RESTART - количество рестартов после окончания разминки
; AUTO_AMMO - автоматическое пополнение патрон при убийстве
; PAUSE_STATS - приостанавливает учет статистики AES и Stats
; MUSIC_FOLDER - путь (от папки sound) к папке с mp3 для разминки
; WARMUP_TIME - время разминки: AUTO (по времени трека) или число от 10 до 90 (сек)
; HIGHLIGHT_ENABLED - подсветка лидера разминки (0 - выкл, 1 - вкл)
; HIGHLIGHT_MODEL_ENABLED - подсветка модели лидера (0 - выкл, 1 - вкл)
; HIGHLIGHT_INTERVAL - период подсветки лидера (от 0.1 до 5.0 сек)
; HIGHLIGHT_RADIUS - радиус кольца подсветки лидера (от 10.0 до 500.0)
; HIGHLIGHT_HEIGHT - смещение кольца подсветки лидера по высоте относительно ног (от -100.0 до 100.0)
; HIGHLIGHT_COLOR - цвет кольца подсветки в формате R G B (каждое значение 0-255)
; HIGHLIGHT_MODEL_COLOR - цвет подсветки модели в формате R G B (каждое значение 0-255)
; RESULTS_FADE_ALPHA - сила затемнения экрана перед выводом топа (0-255, где 0 - выкл)
[VARIABLES]
	RESTART = 1
	AUTO_AMMO = 1
	PAUSE_STATS = 1
	MUSIC_FOLDER = ms/Warm_Up
	WARMUP_TIME = AUTO
	HIGHLIGHT_ENABLED = 1
	HIGHLIGHT_MODEL_ENABLED = 1
	HIGHLIGHT_INTERVAL = 5.0
	HIGHLIGHT_RADIUS = 100.0
	HIGHLIGHT_HEIGHT = 0.0
	HIGHLIGHT_COLOR = 0 255 0
	HIGHLIGHT_MODEL_COLOR = 255 0 0
	RESULTS_FADE_ALPHA = 180


; Список плагинов которые будут ставится на паузу в момент разминки
; Примечание: вводите без .amxx
[PLUGINS]
	;vip
	;kill_assist
	Knife_Duel
	ms_throws_knife


; Режим разминки (пикается рандомно)
; Правила заполнения просты: вводите все пункты через символ | (примеры будут приведены ниже как по умолчанию)
; 
; 1. Оружие (вводите через пробел)
; [
;    B1: glock18, usp, p228, deagle, fiveseven, elite
;    B2: m3, xm1014
;    B3: tmp, mac10, mp5, ump45, p90
;    B4: galil, famas, ak47, m4a1, scout, aug, sg552, sg550, g3sg1, awp
;    B5: m249
;    NADES: hegrenade, flash, sgren
; ]
; 2. Описание в HUD о разминке
; 3. Кол-во здоровья
; 4. Время защиты после спавна
; 5. Время через которое игрок воскреснет вновь
; 6. Время самой разминки (в секундах)
; 7. Броня при спавне (0 - нет, 1 - броня, 2 - броня + шлем)
; 8. Получает ли урон от падения?
[WEAPS]
knife | РАЗМИНКА | 35.0 | 1.0 | 1.0 | 60 | 2 | 1 
;knife m4a1 | Разминка на M4A1 | 100.0 | 2.0 | 1.0 | 60 | 2 | 1 
;knife ak47 | Разминка на AK47 | 100.0 | 2.0 | 1.0 | 60 | 2 | 1 
;knife awp deagle | Разминка на Awp + Deagle | 100.0 | 2.0 | 1.0 | 60 | 2 | 1 


; Автозаполняемый раздел с файлами из MUSIC_FOLDER.
; При первом запуске плагин сканирует mp3, пытается определить длительность и взять Artist/Title из ID3.
; При смене карты раздел синхронизируется с папкой: новые треки добавляются, удаленные удаляются.
; Формат: путь_к_файлу = ИСПОЛНИТЕЛЬ - НАЗВАНИЕ | время_в_секундах
; Пример: ms/Warm_Up/track.mp3 = PAROV STELAR - FIRE | 57
; Ограничение: артист до 50 символов и название трека до 50 символов.
; Если название не указано, плагин берет его из ID3. Если время не указано, используется WARMUP_TIME.
[MUSIC_FILES]
